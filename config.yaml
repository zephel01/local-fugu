# local-fugu configuration
# Switch backend by setting `backend: ollama` or `backend: vllm`

backend: ollama  # "ollama" | "vllm"

ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"

vllm:
  base_url: "http://localhost:8000/v1"
  api_key: "vllm"

# ── Agent pool ────────────────────────────────────────────────────────────────
# RTX 5090 32 GB optimized — all models either already downloaded or noted below.
# Models load/unload dynamically via Ollama; VRAM does not stack for sequential steps.
#
# Role          Model                          VRAM   SWE-bench  Notes
# ──────────────────────────────────────────────────────────────────────────────
# conductor     qwen3.5:9b                     6.6 GB  —          lightweight planner (already downloaded)
# coder         qwen3.6:27b-coding-nvfp4      19 GB   77.2%      ★ BEST for SWE-bench on 5090
#                                                                  native Blackwell FP4, 262K ctx
#                                                                  (already downloaded)
# reviewer      qwen2.5-coder:14b              9 GB   —          code-understanding specialist (already downloaded)
# planner       qwen3.5:4b                     3.4 GB  —          ultra-light decomposer (already downloaded)
#
# ── Why qwen3.6:27b-coding-nvfp4 over qwen3-coder:30b ──────────────────────
#   qwen3-coder:30b         SWE-bench Verified: ~64%   18 GB
#   qwen3.6:27b-coding-nvfp4  SWE-bench Verified: 77.2%  19 GB  ← 13pt better
#   RTX 5090 has native FP4 tensor cores (Blackwell GB202) → ~5200 tok/s prefill
#
# ── Alternatives / experiments ───────────────────────────────────────────────
#   coder: "qwen3.6:35b-a3b-coding-nvfp4"   # 21 GB MoE, 198 tok/s, fast iteration
#   coder: "qwen3-coder:30b"                 # 18 GB, 64% SWE-bench (fallback)
#   reviewer: "devstral-small-2:24b-instruct-2512-q4_K_M"
#     # ~14 GB, purpose-built coding agent (Mistral × All Hands AI)
#     # → ollama pull devstral-small-2:24b-instruct-2512-q4_K_M
agents:
  conductor: "qwen3.5:9b"
  coder:     "qwen3.6:27b-coding-nvfp4"
  reviewer:  "qwen2.5-coder:14b"
  planner:   "qwen3.5:4b"

pipeline:
  max_parallel_steps: 2       # coder(19GB) + reviewer(9GB) = 28GB; safe within 32GB
  temperature:
    conductor: 0.4
    default:   0.2
  timeout_seconds: 240
