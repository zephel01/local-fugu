# local-fugu configuration
# Switch backend by setting `backend: ollama` or `backend: vllm`

backend: ollama  # "ollama" | "vllm"

ollama:
  base_url: "http://localhost:11434/v1"
  api_key: "ollama"

vllm:
  base_url: "http://localhost:8000/v1"
  api_key: "vllm"

# ── Agent pool ────────────────────────────────────────────────────────────────
# Hardware: NucBox EVO X2 / RTX 5090 32GB VRAM / 62GB RAM
#
# VRAM budget (32607 MiB):
#   coder (qwen3.6:27b)       → 24 GB on GPU  (measured via nvidia-smi)
#   others (qwen2.5-coder:7b) →  8 GB on GPU
#   Max simultaneous           → 32 GB ≈ full VRAM
#
# Key constraint: conductor/reviewer/planner must ALL fit alongside the coder.
# conductor=reviewer=qwen2.5-coder:7b → loaded once, shared by both roles.
#
# ── Format note ──────────────────────────────────────────────────────────────
#   nvfp4 variants (e.g. qwen3.6:27b-coding-nvfp4) → Mac / Apple Silicon MLX only
#   CUDA / RTX 5090 → use standard Q4_K_M GGUF (no suffix)
#
# ── ⚠️  CUDA 13.2 bug ────────────────────────────────────────────────────────
#   Produces gibberish on Qwen 3.6 with CUDA 13.2. Use 13.1 or 12.x.
#   Current: CUDA 13.3 (from nvidia-smi) → OK
#
# ── Upgrade paths ────────────────────────────────────────────────────────────
#   coder upgrade : qwen3.6:27b-q6_k  (~22.5 GB, higher quality, still fits)
#   coder speed   : qwen3.6:35b-a3b   (MoE, only 3B active → fast, already downloaded)
#   reviewer upgrade (after coder unloads):
#     devstral-small-2:24b-instruct-2512-q4_K_M  (14 GB)
#     → needs keep_alive=0 to fully work; coder(24GB)+devstral(14GB)=38GB > 32GB
#     → safe only if coder is fully unloaded first
agents:
  conductor: "qwen2.5-coder:7b"   #  8 GB GPU — planner (same model as reviewer → shared)
  coder:     "qwen3-coder:30b"        # 24 GB GPU — 77.2% SWE-bench Verified
  reviewer:  "qwen2.5-coder:7b"   #  8 GB GPU — fits alongside coder (32 GB total)
  planner:   "qwen2.5-coder:7b"   #  8 GB GPU — same model as conductor/reviewer (shared in VRAM)

pipeline:
  max_parallel_steps: 2       # coder(24GB) + reviewer(8GB) = 32GB; at VRAM limit
  temperature:
    conductor: 0.4
    default:   0.2
  timeout_seconds: 600
